name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Check release signing secrets
        id: signing
        env:
          PROTATO_KEYSTORE_BASE64: ${{ secrets.PROTATO_KEYSTORE_BASE64 }}
          PROTATO_KEYSTORE_PASSWORD: ${{ secrets.PROTATO_KEYSTORE_PASSWORD }}
          PROTATO_KEY_ALIAS: ${{ secrets.PROTATO_KEY_ALIAS }}
          PROTATO_KEY_PASSWORD: ${{ secrets.PROTATO_KEY_PASSWORD }}
        run: |
          if [ -n "$PROTATO_KEYSTORE_BASE64" ] && \
             [ -n "$PROTATO_KEYSTORE_PASSWORD" ] && \
             [ -n "$PROTATO_KEY_ALIAS" ] && \
             [ -n "$PROTATO_KEY_PASSWORD" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode release keystore
        if: steps.signing.outputs.available == 'true'
        env:
          PROTATO_KEYSTORE_BASE64: ${{ secrets.PROTATO_KEYSTORE_BASE64 }}
        run: |
          echo "$PROTATO_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/protato-release.jks"

      - name: Build signed release APK
        if: steps.signing.outputs.available == 'true'
        env:
          PROTATO_KEYSTORE_PATH: ${{ runner.temp }}/protato-release.jks
          PROTATO_KEYSTORE_PASSWORD: ${{ secrets.PROTATO_KEYSTORE_PASSWORD }}
          PROTATO_KEY_ALIAS: ${{ secrets.PROTATO_KEY_ALIAS }}
          PROTATO_KEY_PASSWORD: ${{ secrets.PROTATO_KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Build debug APK fallback
        if: steps.signing.outputs.available != 'true'
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Prepare release asset
        run: |
          if [ "${{ steps.signing.outputs.available }}" = "true" ]; then
            cp app/build/outputs/apk/release/app-release.apk "protato-${GITHUB_REF_NAME}-release.apk"
          else
            cp app/build/outputs/apk/debug/app-debug.apk "protato-${GITHUB_REF_NAME}-debug.apk"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: protato-${{ github.ref_name }}-*.apk
          generate_release_notes: true
